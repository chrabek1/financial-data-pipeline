
services:
  postgres:
    image: postgres:16
    container_name: finance_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finance_network

  pipeline:
    build: .
    container_name: finance_pipeline
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - finance_network
    volumes:
      - .:/app

volumes:
  postgres_data:

networks:
  finance_network: