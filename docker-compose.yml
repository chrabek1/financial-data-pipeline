version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: finance_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finance_network

volumes:
  postgres_data:

networks:
  finance_network: